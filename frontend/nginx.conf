server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA: rutas desconocidas → index.html (React Router las maneja)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # No cachear el HTML principal (siempre versión fresca)
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
    }

    # Cachear assets con hash (Vite genera nombres con hash)
    location ~* \.(js|css|png|jpg|jpeg|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
