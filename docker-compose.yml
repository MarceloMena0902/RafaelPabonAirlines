version: "3.9"

# ═══════════════════════════════════════════════════════════════
#  RafaelPabonAirlines — Sistema Distribuido CP
#  3 nodos: Beijing (SQL Server), Ucrania (SQL Server), La Paz (MongoDB)
#
#  Uso rápido:
#    docker compose up -d
#
#  Primera vez (cargar datos):
#    docker compose up -d
#    docker exec rpa_backend python ingestion/parallel_loader.py --local
# ═══════════════════════════════════════════════════════════════

services:

  # ── Nodo Beijing (SQL Server 2022) ───────────────────────────
  sqlserver_beijing:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: rpa_sqlserver_beijing
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "RPA_StrongPass123!"
      MSSQL_PID: Developer
    ports:
      - "1433:1433"
    volumes:
      - beijing_data:/var/opt/mssql
      - ./backend/db/init:/init:ro
    entrypoint: ["/bin/bash", "/init/entrypoint_sql.sh"]
    healthcheck:
      test: ["CMD-SHELL",
        "/opt/mssql-tools18/bin/sqlcmd -S localhost,1433 -U sa -P 'RPA_StrongPass123!' -No -Q 'SELECT 1' > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 30
      start_period: 90s
    restart: unless-stopped

  # ── Nodo Ucrania (SQL Server 2022) ───────────────────────────
  sqlserver_ukraine:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: rpa_sqlserver_ukraine
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "RPA_StrongPass123!"
      MSSQL_PID: Developer
    ports:
      - "1434:1433"
    volumes:
      - ukraine_data:/var/opt/mssql
      - ./backend/db/init:/init:ro
    entrypoint: ["/bin/bash", "/init/entrypoint_sql.sh"]
    healthcheck:
      test: ["CMD-SHELL",
        "/opt/mssql-tools18/bin/sqlcmd -S localhost,1433 -U sa -P 'RPA_StrongPass123!' -No -Q 'SELECT 1' > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 30
      start_period: 90s
    restart: unless-stopped

  # ── Nodo La Paz (MongoDB 7) ──────────────────────────────────
  mongodb_lapaz:
    image: mongo:7
    container_name: rpa_mongodb_lapaz
    command: >
      mongod
      --wiredTigerCacheSizeGB 1
      --setParameter diagnosticDataCollectionEnabled=0
    environment:
      MONGO_INITDB_ROOT_USERNAME: rpa_admin
      MONGO_INITDB_ROOT_PASSWORD: "RPA_MongoPass123!"
      MONGO_INITDB_DATABASE: rpa_db
    ports:
      - "27017:27017"
    volumes:
      - lapaz_data:/data/db
      - ./backend/db/init/mongo_init.js:/docker-entrypoint-initdb.d/01_init.js:ro
    healthcheck:
      test: >
        mongosh --quiet
        -u rpa_admin -p "RPA_MongoPass123!"
        --authenticationDatabase admin
        --eval "db.adminCommand('ping').ok"
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s
    restart: unless-stopped

  # ── Backend FastAPI ──────────────────────────────────────────
  rpa_backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: rpa_backend:latest
    container_name: rpa_backend
    environment:
      SQL_BEIJING_HOST: sqlserver_beijing
      SQL_UKRAINE_HOST: sqlserver_ukraine
      MONGO_HOST: mongodb_lapaz
    ports:
      - "8000:8000"
    volumes:
      # Contexto externo (logo.png, datasets)
      - ${CONTEXT_PATH:-./backend/context}:/app/context:ro
      # Datasets persistidos (pasajeros.csv, vuelos.csv) — montados para no perderlos en rebuild
      - ${DATASETS_PATH:-E:/ISI trabajos/7moSem/Sistemas Distribuidos/Contexto}:/app/data/datasets:ro
    depends_on:
      sqlserver_beijing:
        condition: service_healthy
      sqlserver_ukraine:
        condition: service_healthy
      mongodb_lapaz:
        condition: service_healthy
    restart: unless-stopped

  # ── Frontend React (nginx) ───────────────────────────────────
  rpa_frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: rpa_frontend:latest
    container_name: rpa_frontend
    ports:
      - "3000:80"
    depends_on:
      - rpa_backend
    restart: unless-stopped

# ── Volúmenes persistentes ───────────────────────────────────
volumes:
  beijing_data:
    name: rpa_beijing_data
  ukraine_data:
    name: rpa_ukraine_data
  lapaz_data:
    name: rpa_lapaz_data
